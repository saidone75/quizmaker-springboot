spring:
  datasource:
    url: jdbc:h2:mem:quizmakerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.saidone.quizmaker: DEBUG

app:
  turnstile:
    enabled: ${TURNSTILE_ENABLED:true}
    site-key: ${TURNSTILE_SITE_KEY:}
    secret-key: ${TURNSTILE_SECRET_KEY:}
    verify-url: ${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
