<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errore — Alice's Simple Quiz Maker</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="login-screen">
    <div class="login-card error-card">
        <div class="error-emoji" aria-hidden="true"
             th:text="${status == 404 ? '🦊' : status == 403 ? '🦉' : status >= 500 ? '🐲' : status >= 400 ? '🐛' : '🐞'}">🐞</div>
        <h1 class="login-title">Oops, qualcosa è andato storto</h1>
        <p class="login-sub">Non siamo riusciti a completare la richiesta.</p>

        <div class="alert alert-error error-status">
            <strong>Codice errore:</strong>
            <span th:text="${status}">500</span>
        </div>

        <p class="error-main-message">
            Si è verificato un errore. Se il problema persiste, contatta il cappellaio indicando il codice.
        </p>

        <div class="error-actions">
            <a class="topbar-back" th:href="${homeUrl}">← Torna alla home</a>
            <a class="topbar-back" href="javascript:history.back()">↶ Torna indietro</a>
        </div>
    </div>
</div>
</body>
</html>
